name: Deploy verified portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: verified-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build public portfolio
        env:
          NETLIFY_ORIGIN: https://365dailysnap.netlify.app
        run: |
          node scripts/mirror.mjs
          node scripts/fix-public-site.mjs
          node scripts/cleanup.mjs
      - name: Prepare routes
        run: |
          mkdir -p site/ko site/ja site/en site/admin site/manager
          cp site/index.html site/ko/index.html
          cp site/index.html site/ja/index.html
          cp site/index.html site/en/index.html
          cp site/index.html site/404.html
          cp site/admin-v2.html site/admin/index.html
          cp site/admin-v2.html site/manager/index.html
          cp site/admin-v2.html site/admin.html
          printf 'snap.lavalabs.co.kr\n' > site/CNAME
          touch site/.nojekyll
          sleep 20
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy verified portfolio
        id: deployment
        uses: actions/deploy-pages@v4
