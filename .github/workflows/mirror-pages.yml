name: Deploy 365 Daily Snap to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout public deployment repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync portfolio data and media
        env:
          NETLIFY_ORIGIN: https://365dailysnap.netlify.app
        run: node scripts/mirror.mjs

      - name: Persist mirrored public assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/portfolio site/reviews 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync public portfolio assets [skip ci]"
            git push origin HEAD:main
          fi

      - name: Prepare language and admin routes
        shell: bash
        run: |
          mkdir -p site/ko site/ja site/en site/admin site/manager
          cp site/index.html site/ko/index.html
          cp site/index.html site/ja/index.html
          cp site/index.html site/en/index.html
          cp site/index.html site/404.html
          cp site/admin-v2.html site/admin/index.html
          cp site/admin-v2.html site/manager/index.html
          cp site/admin-v2.html site/admin.html
          printf 'snap.lavalabs.co.kr\n' > site/CNAME
          touch site/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
