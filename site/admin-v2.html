<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>365 Daily Snap Admin</title>
    <style>
      :root{--paper:#f6f2e9;--white:#fffdf8;--ink:#1a1917;--muted:#716b63;--line:rgba(26,25,23,.14);--good:#27663d;--bad:#983b31;font-family:Inter,Pretendard,system-ui,sans-serif;color-scheme:light}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);word-break:keep-all}a{color:inherit}button,input,select{font:inherit}button,.button{display:inline-flex;min-height:40px;align-items:center;justify-content:center;border:1px solid var(--ink);background:var(--ink);color:var(--paper);padding:8px 14px;font-size:13px;font-weight:760;text-decoration:none;cursor:pointer}button.secondary,.button.secondary{border-color:var(--line);background:var(--white);color:var(--ink)}button.danger{border-color:rgba(152,59,49,.35);background:transparent;color:var(--bad)}button:disabled{opacity:.5}.shell{width:min(1180px,calc(100% - 32px));margin:auto}header{position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);background:rgba(246,242,233,.94);backdrop-filter:blur(16px)}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0}.brand strong{display:block}.brand span,.eyebrow{color:var(--muted);font-size:11px;font-weight:780;letter-spacing:.14em;text-transform:uppercase}.actions{display:flex;flex-wrap:wrap;gap:8px}main{padding:34px 0 80px}.hero{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,.65fr);gap:20px;align-items:end}.hero h1{max-width:760px;margin:8px 0 12px;font-size:clamp(34px,5vw,58px);line-height:1.02;letter-spacing:-.055em;font-weight:560}.hero p{color:var(--muted);line-height:1.75}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;overflow:hidden;border:1px solid var(--line);background:var(--line)}.stat{min-height:100px;background:var(--white);padding:16px}.stat strong{display:block;margin-top:8px;font-size:34px;font-weight:520}.card{margin-top:20px;border:1px solid var(--line);background:rgba(255,253,248,.78);padding:20px}.card h2{margin:5px 0 8px;font-size:clamp(24px,3vw,36px);letter-spacing:-.04em}.muted,.status{color:var(--muted);font-size:13px;line-height:1.65}.status.good{color:var(--good)}.status.bad{color:var(--bad)}.login{display:grid;grid-template-columns:1fr auto;gap:8px;max-width:650px;margin-top:14px}input,select{width:100%;border:1px solid var(--line);background:var(--white);padding:11px;color:var(--ink)}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:16px 0}.inquiry-list{display:grid;gap:10px}.inquiry{border:1px solid var(--line);background:rgba(255,255,255,.55);padding:16px}.inquiry-head{display:flex;justify-content:space-between;gap:12px}.inquiry h3{margin:0}.inquiry-head span,.meta{color:var(--muted);font-size:12px}.meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin:10px 0}.inquiry p{white-space:pre-wrap;line-height:1.7}.inquiry-actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.inquiry-actions select{width:auto;min-width:140px}.empty{border:1px dashed var(--line);padding:32px;text-align:center;color:var(--muted)}.refs{display:flex;flex-wrap:wrap;gap:8px}.refs a{border-bottom:1px solid currentColor;font-size:13px}@media(max-width:760px){.top,.hero{display:grid;grid-template-columns:1fr}.actions,.toolbar,.inquiry-head{align-items:stretch;flex-direction:column}.login{grid-template-columns:1fr}button,.button{width:100%}.inquiry-actions select{width:100%}}
    </style>
  </head>
  <body>
    <header><div class="shell top"><div class="brand"><strong>365 Daily Snap Admin</strong><span>Secure inquiry inbox</span></div><nav class="actions"><a class="button" href="/ko" target="_blank" rel="noreferrer">공개 사이트</a><a class="button secondary" href="https://github.com/kyungminkim11/365-daily-snap/tree/main/public/portfolio" target="_blank" rel="noreferrer">포트폴리오 원본</a></nav></div></header>
    <main class="shell">
      <section class="hero"><div><p class="eyebrow">ADMIN WORKSPACE</p><h1>촬영 문의와 공개 포트폴리오 상태를 확인합니다.</h1><p>문의는 Supabase에 저장되고, 포트폴리오 사진은 공개 배포 저장소로 자동 복제됩니다.</p></div><div class="stats"><div class="stat"><span class="eyebrow">Projects</span><strong id="projectCount">-</strong></div><div class="stat"><span class="eyebrow">Media</span><strong id="mediaCount">-</strong></div><div class="stat"><span class="eyebrow">New</span><strong id="newCount">-</strong></div><div class="stat"><span class="eyebrow">Total</span><strong id="totalCount">-</strong></div></div></section>
      <section class="card" id="authCard"><p class="eyebrow">SECURE LOGIN</p><h2>관리자 이메일 로그인</h2><p class="muted">허용된 이메일로 전송된 매직 링크를 눌러 로그인하세요.</p><div class="login"><input id="email" type="email" value="lavalabs.ceo@gmail.com" autocomplete="email" /><button id="login" type="button">로그인 링크 받기</button></div><p id="authStatus" class="status"></p></section>
      <section class="card" id="inboxCard" hidden><div class="toolbar"><div><p class="eyebrow">INQUIRIES</p><h2>촬영 문의함</h2><p id="signedIn" class="status"></p></div><div class="actions"><button id="refresh" class="secondary" type="button">새로고침</button><button id="logout" class="secondary" type="button">로그아웃</button></div></div><p id="inboxStatus" class="status"></p><div id="inquiryList" class="inquiry-list"></div></section>
    </main>
    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
      const URL='https://jnciddblcndmthmmvqrz.supabase.co';
      const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuY2lkZGJsY25kbXRobW12cXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjI4MzUsImV4cCI6MjA5NzA5ODgzNX0.X7KFyKtc-lqKTgbqJodZ6zr6qcxjm23gnsyUJYOFpAg';
      const allowed=['lavalabs.ceo@gmail.com','info@lavalabs.co.kr'];
      const supabase=createClient(URL,KEY,{auth:{persistSession:true,detectSessionInUrl:true}});
      const $=(selector)=>document.querySelector(selector);
      const esc=(value='')=>String(value).replace(/[&<>'"]/g,(char)=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
      const formatDate=(value)=>new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(new Date(value));

      async function loadPortfolio(){try{const response=await fetch('/portfolio/portfolio.json',{cache:'no-cache'});const content=await response.json();const projects=Array.isArray(content.projects)?content.projects:[];$('#projectCount').textContent=projects.length;$('#mediaCount').textContent=projects.reduce((sum,project)=>sum+(project.media?.length||0),0)}catch{$('#projectCount').textContent='-';$('#mediaCount').textContent='-'}}
      async function sendLink(){const email=$('#email').value.trim().toLowerCase();if(!allowed.includes(email)){setStatus($('#authStatus'),'허용된 관리자 이메일만 사용할 수 있습니다.','bad');return}setStatus($('#authStatus'),'로그인 링크를 보내는 중입니다.');const {error}=await supabase.auth.signInWithOtp({email,options:{emailRedirectTo:`${location.origin}/admin-v2.html`}});if(error){setStatus($('#authStatus'),`전송 실패: ${error.message}`,'bad');return}setStatus($('#authStatus'),'이메일로 로그인 링크를 보냈습니다.','good')}
      function setStatus(element,text,type=''){element.textContent=text;element.className=`status ${type}`.trim()}
      async function loadInquiries(){setStatus($('#inboxStatus'),'문의를 불러오는 중입니다.');const {data,error}=await supabase.from('inquiries').select('*').order('created_at',{ascending:false});if(error){setStatus($('#inboxStatus'),`불러오기 실패: ${error.message}`,'bad');return}const fresh=data.filter((item)=>item.status==='new').length;$('#newCount').textContent=fresh;$('#totalCount').textContent=data.length;setStatus($('#inboxStatus'),`전체 ${data.length}건 · 신규 ${fresh}건`,'good');$('#inquiryList').innerHTML=data.length?data.map((item)=>`<article class="inquiry" data-id="${esc(item.id)}"><div class="inquiry-head"><div><h3>${esc(item.name)} · ${esc(item.inquiry_type||'촬영 문의')}</h3><span>${formatDate(item.created_at)}</span></div><strong>${esc(item.status||'new')}</strong></div><div class="meta"><span>${esc(item.contact_method||'연락 방법')}: ${esc(item.contact)}</span><span>희망일: ${esc(item.preferred_date||'-')}</span><span>지역: ${esc(item.region||'-')}</span><span>인원: ${esc(item.people||'-')}</span><span>공개: ${esc(item.privacy||'-')}</span></div>${item.mood?`<p><b>분위기</b><br>${esc(item.mood)}</p>`:''}${item.purpose?`<p><b>목적</b><br>${esc(item.purpose)}</p>`:''}${item.message?`<p><b>추가 요청</b><br>${esc(item.message)}</p>`:''}${Array.isArray(item.reference_images)&&item.reference_images.length?`<div class="refs">${item.reference_images.map((url,index)=>`<a href="${esc(url)}" target="_blank" rel="noreferrer">참고 이미지 ${index+1}</a>`).join('')}</div>`:''}<div class="inquiry-actions"><select aria-label="문의 상태"><option value="new" ${item.status==='new'?'selected':''}>신규</option><option value="contacted" ${item.status==='contacted'?'selected':''}>연락 완료</option><option value="confirmed" ${item.status==='confirmed'?'selected':''}>촬영 확정</option><option value="closed" ${item.status==='closed'?'selected':''}>종료</option></select><button type="button" data-action="save">상태 저장</button><button type="button" class="danger" data-action="delete">삭제</button></div></article>`).join(''):'<div class="empty">접수된 문의가 없습니다.</div>'}
      async function updateStatus(id,status){const {error}=await supabase.from('inquiries').update({status}).eq('id',id);if(error)alert(`상태 변경 실패: ${error.message}`);else loadInquiries()}
      async function removeInquiry(id){if(!confirm('이 문의를 삭제할까요?'))return;const {error}=await supabase.from('inquiries').delete().eq('id',id);if(error)alert(`삭제 실패: ${error.message}`);else loadInquiries()}
      $('#inquiryList').addEventListener('click',(event)=>{const button=event.target.closest('button[data-action]');if(!button)return;const card=button.closest('.inquiry');if(button.dataset.action==='save')updateStatus(card.dataset.id,card.querySelector('select').value);if(button.dataset.action==='delete')removeInquiry(card.dataset.id)});
      async function renderSession(){const {data:{session}}=await supabase.auth.getSession();const email=session?.user?.email?.toLowerCase();if(!session||!allowed.includes(email)){$('#authCard').hidden=false;$('#inboxCard').hidden=true;$('#newCount').textContent='-';$('#totalCount').textContent='-';return}$('#authCard').hidden=true;$('#inboxCard').hidden=false;$('#signedIn').textContent=`${email} 로그인 중`;loadInquiries()}
      $('#login').addEventListener('click',sendLink);$('#refresh').addEventListener('click',loadInquiries);$('#logout').addEventListener('click',async()=>{await supabase.auth.signOut();renderSession()});supabase.auth.onAuthStateChange(()=>renderSession());loadPortfolio();renderSession();
    </script>
  </body>
</html>
